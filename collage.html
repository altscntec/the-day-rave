<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Day Rave — Collage · 14 June 2026</title>
<meta name="description" content="The Coffee Day Rave, 14 June 2026 — the first edition in pictures. © 2026 House Decoded.">
<meta name="theme-color" content="#E63027">
<meta property="og:title" content="The Day Rave — Collage · 14 June 2026">
<meta property="og:description" content="The first edition, in pictures.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --red:#E63027; --pink:#F8B3C2; --cream:#F4E9CE; --ink:#0B0B0B;
    --D:'Anton',sans-serif; --S:'Archivo',sans-serif; --M:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--ink);font-family:var(--S);-webkit-font-smoothing:antialiased}

  /* top bar */
  .cbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px;background:var(--red);color:var(--cream);border-bottom:1px solid rgba(244,233,206,.15)}
  .cbar a{color:var(--cream);text-decoration:none}
  .cbar .logo{font-family:var(--D);font-size:22px;letter-spacing:.02em;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px}
  .cbar .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--cream)}
  .cbar .back{font-family:var(--M);font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.85;padding:9px 16px;border:1px solid rgba(244,233,206,.4);border-radius:999px;transition:background .2s,color .2s}
  .cbar .back:hover{background:var(--cream);color:var(--red)}

  /* head */
  .collage-head{text-align:center;padding:72px 24px 30px}
  .collage-eye{font-family:var(--M);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--red);opacity:.85;margin-bottom:14px}
  .collage-title{font-family:var(--D);font-size:clamp(52px,10vw,140px);line-height:.88;text-transform:uppercase;color:var(--red);letter-spacing:-.01em}
  .collage-sub{font-family:var(--M);font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin-top:16px}
  .collage-zoom{display:inline-flex;align-items:center;gap:14px;margin-top:26px}
  .cz-btn{width:38px;height:38px;border-radius:999px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-family:var(--D);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
  .cz-btn:hover{background:var(--red);color:var(--cream)}
  #czRange{accent-color:var(--red);width:160px;cursor:pointer}

  /* grid */
  .collage-grid{display:grid;gap:4px;padding:0 12px 8px}
  .collage-grid[data-zoom="0"]{grid-template-columns:repeat(8,1fr)}
  .collage-grid[data-zoom="1"]{grid-template-columns:repeat(6,1fr)}
  .collage-grid[data-zoom="2"]{grid-template-columns:repeat(4,1fr)}
  .collage-grid[data-zoom="3"]{grid-template-columns:repeat(3,1fr)}
  .ct{position:relative;aspect-ratio:1/1;overflow:hidden;background:linear-gradient(135deg,#E63027 0%,#F8B3C2 100%);cursor:pointer}
  .ct img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:transform .5s cubic-bezier(.2,.8,.2,1),opacity .45s}
  .ct img.loaded{opacity:1}
  .ct:hover img.loaded{transform:scale(1.06)}
  .ct::after{content:'';position:absolute;inset:0;background:rgba(11,11,11,0);transition:background .25s;pointer-events:none}
  .ct:hover::after{background:rgba(11,11,11,.12)}

  .collage-foot{font-family:var(--M);font-size:9px;letter-spacing:.18em;text-transform:uppercase;opacity:.45;text-align:center;padding:30px 24px 60px;line-height:1.8}

  @media(max-width:680px){
    .collage-head{padding:48px 16px 24px}
    .collage-grid{gap:3px;padding:0 6px 6px}
    .collage-grid[data-zoom="0"]{grid-template-columns:repeat(4,1fr)}
    .collage-grid[data-zoom="1"]{grid-template-columns:repeat(3,1fr)}
    .collage-grid[data-zoom="2"]{grid-template-columns:repeat(2,1fr)}
    .collage-grid[data-zoom="3"]{grid-template-columns:repeat(1,1fr)}
  }

  /* lightbox */
  .cl{position:fixed;inset:0;z-index:1000;background:rgba(11,11,11,.94);display:none;align-items:center;justify-content:center}
  .cl.open{display:flex}
  .cl-stage{max-width:92vw;max-height:86vh;display:flex;align-items:center;justify-content:center}
  .cl-img{max-width:92vw;max-height:86vh;object-fit:contain;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .cl-x{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:999px;border:1px solid rgba(244,233,206,.4);background:transparent;color:var(--cream);font-size:18px;cursor:pointer;z-index:2}
  .cl-nav{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:999px;border:1px solid rgba(244,233,206,.4);background:rgba(11,11,11,.4);color:var(--cream);font-size:30px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
  .cl-prev{left:18px}.cl-next{right:18px}
  .cl-x:hover,.cl-nav:hover{background:var(--red);border-color:var(--red)}
  .cl-count{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-family:var(--M);font-size:11px;letter-spacing:.2em;color:var(--cream);opacity:.7}
  @media(max-width:680px){.cl-nav{width:42px;height:42px;font-size:24px}.cl-prev{left:6px}.cl-next{right:6px}}
</style>
</head>
<body>
  <header class="cbar">
    <a class="logo" href="index.html"><span class="dot"></span> The Day Rave</a>
    <a class="back" href="index.html">← Back to site</a>
  </header>

  <div class="collage-head">
    <div class="collage-eye">— The Collage —</div>
    <h1 class="collage-title">14 June 2026</h1>
    <p class="collage-sub">The first edition, in pictures. Pinch or use the slider to zoom.</p>
    <div class="collage-zoom" role="group" aria-label="Photo size">
      <button type="button" class="cz-btn" id="czOut" aria-label="Smaller photos">–</button>
      <input type="range" id="czRange" min="0" max="3" step="1" value="1" aria-label="Photo size">
      <button type="button" class="cz-btn" id="czIn" aria-label="Larger photos">+</button>
    </div>
  </div>

  <div class="collage-grid" id="collageGrid" data-zoom="1" aria-label="Photo collage"></div>

  <div class="collage-foot">© 2026 House Decoded — All rights reserved.<br>Photos may not be reproduced or reused without permission.</div>

  <!-- lightbox -->
  <div class="cl" id="clBox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button type="button" class="cl-x" id="clClose" aria-label="Close">✕</button>
    <button type="button" class="cl-nav cl-prev" id="clPrev" aria-label="Previous photo">‹</button>
    <div class="cl-stage"><img class="cl-img" id="clImg" alt="The Coffee Day Rave — 14 June 2026"></div>
    <button type="button" class="cl-nav cl-next" id="clNext" aria-label="Next photo">›</button>
    <div class="cl-count" id="clCount"></div>
  </div>

<script>
(function(){
  const grid=document.getElementById('collageGrid');
  const N=80, pad=n=>String(n).padStart(2,'0');
  const thumb=n=>'collage/thumb/'+pad(n)+'.jpg', large=n=>'collage/large/'+pad(n)+'.jpg';
  const frag=document.createDocumentFragment();
  for(let i=1;i<=N;i++){
    const fig=document.createElement('figure');
    fig.className='ct'; fig.dataset.i=i;
    const img=document.createElement('img');
    img.loading='lazy'; img.decoding='async';
    img.alt='The Coffee Day Rave — 14 June 2026';
    img.addEventListener('load',()=>img.classList.add('loaded'));
    img.addEventListener('error',()=>img.remove()); /* leave gradient placeholder */
    img.src=thumb(i);
    fig.appendChild(img);
    fig.addEventListener('click',()=>openLb(i));
    frag.appendChild(fig);
  }
  grid.appendChild(frag);

  /* zoom */
  const range=document.getElementById('czRange'),
        zin=document.getElementById('czIn'),
        zout=document.getElementById('czOut');
  const setZoom=v=>{v=Math.max(0,Math.min(3,v)); grid.dataset.zoom=v; if(range)range.value=v;};
  range.addEventListener('input',e=>setZoom(+e.target.value));
  zin.addEventListener('click',()=>setZoom(+grid.dataset.zoom+1));
  zout.addEventListener('click',()=>setZoom(+grid.dataset.zoom-1));

  /* lightbox */
  const box=document.getElementById('clBox'),
        clImg=document.getElementById('clImg'),
        clCount=document.getElementById('clCount');
  let cur=1;
  function paint(){clImg.src=large(cur); clCount.textContent=cur+' / '+N;}
  function openLb(i){cur=i; paint(); box.classList.add('open'); box.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden';}
  function closeLb(){box.classList.remove('open'); box.setAttribute('aria-hidden','true'); document.body.style.overflow='';}
  function nav(d){cur=((cur-1+d+N)%N)+1; paint();}
  document.getElementById('clClose').addEventListener('click',closeLb);
  document.getElementById('clPrev').addEventListener('click',()=>nav(-1));
  document.getElementById('clNext').addEventListener('click',()=>nav(1));
  box.addEventListener('click',e=>{if(e.target===box)closeLb();});
  document.addEventListener('keydown',e=>{
    if(!box.classList.contains('open'))return;
    if(e.key==='Escape')closeLb();
    else if(e.key==='ArrowRight')nav(1);
    else if(e.key==='ArrowLeft')nav(-1);
  });
})();
</script>
</body>
</html>
