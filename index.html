<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Day Rave — Brewing Something Cool</title>
<meta name="description" content="The Day Rave is brewing something cool. We'll be back soon.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#E63027">
<meta property="og:title" content="The Day Rave — Brewing Something Cool">
<meta property="og:description" content="We are brewing, something cool… we will be back soon.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --red:#E63027;
    --pink:#F8B3C2;
    --cream:#F4E9CE;
    --ink:#0B0B0B;
    --D:'Anton',sans-serif;
    --S:'Archivo',sans-serif;
    --M:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--red);
    color:var(--cream);
    font-family:var(--S);
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    overflow:hidden;
    position:relative;
  }
  /* faint grid texture */
  .grid{
    position:absolute;inset:0;opacity:.06;pointer-events:none;
    background-image:linear-gradient(var(--cream) 1px,transparent 1px),linear-gradient(90deg,var(--cream) 1px,transparent 1px);
    background-size:56px 56px;
  }
  /* soft moving glow */
  .glow{
    position:absolute;inset:-25%;pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%,rgba(248,179,194,.20) 0%,rgba(248,179,194,0) 60%);
    animation:glow 9s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  .wrap{position:relative;z-index:2;text-align:center;max-width:760px}

  .brand{
    font-family:var(--M);font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:10px;opacity:.85;margin-bottom:38px;
  }
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--pink);box-shadow:0 0 12px var(--pink);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}

  .eyebrow{
    font-family:var(--M);font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--cream);opacity:.7;display:inline-flex;align-items:center;gap:14px;margin-bottom:26px;
  }
  .eyebrow::before,.eyebrow::after{content:'';width:34px;height:1.5px;background:var(--pink)}

  h1{
    font-family:var(--D);text-transform:uppercase;line-height:.9;letter-spacing:-.01em;
    font-size:clamp(48px,10vw,128px);
  }
  h1 .pk{color:var(--pink)}

  .msg{
    font-family:var(--M);font-size:clamp(13px,1.6vw,17px);letter-spacing:.12em;
    text-transform:uppercase;line-height:1.7;opacity:.9;margin-top:30px;
  }

  /* brewing dots */
  .brew{display:inline-flex;gap:7px;margin-left:4px;vertical-align:middle}
  .brew i{width:7px;height:7px;border-radius:50%;background:var(--pink);display:inline-block;animation:bob 1.4s ease-in-out infinite}
  .brew i:nth-child(2){animation-delay:.2s}
  .brew i:nth-child(3){animation-delay:.4s}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-7px);opacity:1}}

  .social{margin-top:46px}
  .social a{
    font-family:var(--M);font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--cream);text-decoration:none;border:1px solid rgba(244,233,206,.4);
    border-radius:999px;padding:13px 24px;transition:background .25s,color .25s;display:inline-block;
  }
  .social a:hover{background:var(--cream);color:var(--red)}

  @media(max-width:600px){
    .brand{margin-bottom:28px}
    .msg{letter-spacing:.08em}
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <main class="wrap">
    <div class="brand"><span class="dot"></span> The Day Rave</div>

    <div class="eyebrow">Under Construction</div>

    <h1>We're brewing<br><span class="pk">something cool.</span></h1>

    <p class="msg">
      We are brewing, something cool
      <span class="brew"><i></i><i></i><i></i></span>
      <br>we will be back soon.
    </p>

    <div class="social">
      <a href="https://www.instagram.com/the.day.rave" target="_blank" rel="noopener">Follow @the.day.rave ↗</a>
    </div>
  </main>
</body>
</html>
